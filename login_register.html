<!DOCTYPE html>
<html lang="nl">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inloggen & Registreren | Medixflow</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/login_register.css">
    <link rel="icon" href="/img/logo1.PNG" type="image/png">
  </head>

  <body>

  <section class="formulier-container" id="login-section">
    <header class="logo">
      <a href="/">
        <img src="/svg/logo no bg.svg" alt="Medixflow Logo"></a>
    </header>
    
    <div class="container">
      <div class="form-wrapper">
        <h1>Welkom Terug!</h1>
        <p class="subtitle">Log in om uw afspraken te maken of boeken</p>
          <div class="form-box" id="inlog-form">
            <form action="">

             <h3>E-mail</h3>
             <input type="email" name="e-mail" placeholder="Voer uw e-mail in" required>

             <h3>Wachtwoord</h3>
             <div class="wachtwoord-wrapper">
             <input type="password" id="wachtwoord" name="wachtwoord" placeholder="Voer uw wachtwoord in" required>
             
             <div class="eye-icon" id="togglePassword">
             <svg id="eye-off" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
             <svg id="eye-on" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
             </div>
             </div>

              <button class="inloggen" type="submit" name="inloggen">Inloggen</button>
              <button class="annuleren" type="submit" name="annuleren">Annuleren</button>
              <p>Heeft u nog geen account?<a href="#" onclick="showForm()">Registreer</a></p>
            </form>
          </div>
      </div>
    </div>
  </section>

  <section class="formulier-container" id="register-section">
    <header class="logo">
      <a href="/">
        <img src="/svg/logo no bg.svg" alt="Medixflow Logo"></a>
    </header>
    
    <div class="container">
      <div class="form-wrapper">
        <h1>Welkom Bij Medixflow!</h1>
        <p class="subtitle">Registreer nu om uw afspraak te boeken</p>
          <div class="form-box" id="inlog-form">
            <form action="">

              <h3>Voornaam</h3>
              <input type="text" name="name" placeholder="Voer uw voornaam in" required>

              <h3>Achternaam</h3>
              <input type="text" name="surname" placeholder="Voer uw achternaam in" required>

              <h3>ID-nummer</h3>
              <input type="text" name="ID-nummer" placeholder="Voer uw ID-nummer in" required>

              <h3>E-mail</h3>
              <input type="email" name="e-mail" placeholder="Voer uw e-mail in" required>

             <h3>Wachtwoord</h3>
             <div class="wachtwoord-wrapper">
             <input type="password" id="wachtwoord-reg" name="wachtwoord" placeholder="Voer uw wachtwoord in" required>
             
             <div class="eye-icon" id="toggleReg">
             <svg id="eye-off-reg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
             <svg id="eye-on-reg" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
             </div>
             </div>

             <h3>Bevestig uw wachtwoord</h3>
             <div class="wachtwoord-wrapper">
             <input type="password" id="wachtwoord-conf" name="wachtwoord_confirm" placeholder="Voer uw wachtwoord in" required>
             
             <div class="eye-icon" id="toggleConf">
             <svg id="eye-off-conf" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye-off"><path d="M10.733 5.076a10.744 10.744 0 0 1 11.205 6.575 1 1 0 0 1 0 .696 10.747 10.747 0 0 1-1.444 2.49"/><path d="M14.084 14.158a3 3 0 0 1-4.242-4.242"/><path d="M17.479 17.499a10.75 10.75 0 0 1-15.417-5.151 1 1 0 0 1 0-.696 10.75 10.75 0 0 1 4.446-5.143"/><path d="m2 2 20 20"/></svg>
             <svg id="eye-on-conf" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
             </div>
             </div>

              <button class="registreren" type="submit" name="registreren">Registreren</button>
              <button class="annuleren" type="button">Annuleren</button>
              <p>Heeft al een account? <a href="#" onclick="showForm()">Log in</a></p>
            </form>
          </div>
      </div>
    </div>
  </section>

  <section class="foto-container">
    <div class="foto-card">
      <img src="/img/login-register.jpg" alt="login-register-foto">
    </div>
  </section>

    <script src="/js/login_register.js"></script></body>
</html>
