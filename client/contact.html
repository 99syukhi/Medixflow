<!DOCTYPE html>
<html lang="nl">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home | Medixflow</title>
    <link rel="stylesheet" href="/client/css/main.css">
    <link rel="stylesheet" href="/client/css/contact.css">
    <link rel="icon" href="/client/img/logo1.PNG" type="image/png">
  </head>

  <body>
  <header id="header">
    <a href="/">
    <img src="/client/svg/logo no bg.svg" class="logo" alt="Medixflow Logo"></a>
    <nav class="nav">
      <a class="nav-link" href="/client/index.html">Home</a>
      <a class="nav-link" href="/client/afdelingen.html">Afdelingen</a>
      <a class="nav-link" href="/client/artsen.html">Artsen</a>
      <a class="nav-link" href="/client/contact.html">Contact</a>
    </nav>
    <div class="auth-buttons">
    <a href="/client/login_register.html" class="btn btn-secondary">INLOGGEN</a>
    </div>
  </header>

  <main class="contact-page">
        <section class="contact-header">
            <h1>Contact Ons</h1>
            <p>Heeft u vragen of opmerkingen? Stuur ons gerust een bericht!</p>
        </section>

        <section class="contact-container">
            <div class="contact-box">
                <div class="contact-info">
                    <h2>Contact Informatie</h2>
                    <ul class="info-list">
                        <li>
                            <i class="fas fa-phone-alt"></i>
                            <span>+597 442-222</span>
                        </li>
                        <li>
                            <i class="fas fa-envelope"></i>
                            <span>Medixflowcs@gmail.com</span>
                        </li>
                        <li>
                            <i class="fas fa-map-marker-alt"></i>
                            <span>RRQ8+3XV, Flustraat, Paramaribo</span>
                        </li>
                    </ul>
                    <div class="circle-decoration"></div>
                </div>

                <div class="contact-form">
                    <form id="form-contact">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Voornaam</label>
                                <input type="text" name="firstname" placeholder="Voornaam">
                            </div>
                            <div class="form-group">
                                <label>Achternaam</label>
                                <input type="text" name="lastname" placeholder="Achternaam">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Email</label>
                                <input type="email" name="email" placeholder="Email">
                            </div>
                            <div class="form-group">
                                <label>Telefoonnummer</label>
                                <input type="tel" name="phone" placeholder="Telefoonnummer">
                            </div>
                        </div>
                        <div class="form-group full-width">
                            <label>Vraag/opmerking</label>
                            <textarea name="message" placeholder="Schrijf een bericht.."></textarea>
                        </div>
                        
                        <div class="button-container">
                            <button type="submit" class="btn-submit">Stuur bericht</button>
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <p>&copy; 2026 Medixflow. Alle rechten voorbehouden.</p>
        </div>
    </footer>

</body>
</html>
