<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MedixFlow - Beschikbare Tijden</title>
  <link rel="stylesheet" href="/css/beschikbare-tijden.css" />
</head>
<body class="bt-page">

  <!-- HEADER  -->
  <header class="header">
    <div class="logo-section">
      <img src="/img/medixflow-logo.png" alt="MedixFlow Logo" class="logo">
    </div>

    <div class="user-section">
      <img src="/img/profiel.jpg" alt="Profiel foto" class="profile-img">
      <button class="logout-btn" type="button">Uitloggen</button>
    </div>
  </header>

  <main class="bt-main">

    <section class="bt-title">
      <h2>Beschikbare Tijden</h2>
      <p>Bekijk de vrije tijden van artsen</p>
    </section>

    <section class="bt-layout">

      <!-- LEFT: filters -->
      <div class="bt-left">
        <div class="bt-filter">

          <div class="bt-row">
            <div class="bt-label">Kies een arts</div>

            <!-- wrapper voor mooi dropdown-icoon alignment -->
            <div class="bt-input-wrap bt-select-wrap">
              <select id="doctorSelect" required>
                <option value="" disabled selected hidden>Kies een arts</option>
                <option value="alexander">Drs. F. Alexander</option>
                <option value="velazquez">Drs. R. Velazquez</option>
              </select>
            </div>
          </div>

          <div class="bt-row">
            <div class="bt-label">Kies een datum</div>
            <div class="bt-input-wrap">
              <input id="dateSelect" class="bt-input" type="date" />
            </div>
          </div>

          <button id="viewBtn" class="bt-btn" type="button" disabled>Bekijk tijden</button>
        </div>

        <a class="bt-back" href="/patiëntportaal.html">Terug naar patiëntportaal</a>
      </div>

      <!-- RIGHT: result card -->
      <div class="bt-right">
        <div class="bt-card">
          <div class="bt-card-top">
            <div class="bt-avatar">
              <img id="docImg" src="/img/doctor-alexander.jpg" alt="Arts">
            </div>
            <div class="bt-docmeta">
              <div id="docName" class="bt-docname">----</div>
              <div id="docDept" class="bt-docsub">----</div>
            </div>
          </div>

          <h3 class="bt-card-title">Beschikbare tijden</h3>

          <!-- Scroll alleen voor tijden -->
          <div class="bt-times-scroll" id="timesScroll">
            <div class="bt-times-grid" id="timesGrid"></div>
          </div>

        </div>
      </div>

    </section>

  </main>

  <script src="/js/beschikbare-tijden.js"></script>
</body>
</html>
